<div class="course-list-container">
  <div class="list-header">
    <h2>Available Courses</h2>
    <p class="subtitle">Select and enroll in courses to build your academic term schedule.</p>
  </div>

  <!-- Search Filter Input (Hands-On 7 Step 71) -->
  <div class="search-bar-container" *ngIf="!(loading$ | async)">
    <input 
      type="text" 
      [(ngModel)]="searchTerm" 
      (ngModelChange)="onSearchChange()" 
      placeholder="🔍 Search courses by title or code..." 
      class="search-input"
    />
  </div>

  <!-- Loading State (Hands-On 9 selectCoursesLoading) -->
  <div *ngIf="loading$ | async" class="loading-state">
    <div class="spinner"></div>
    <p>Loading course catalogue...</p>
  </div>

  <!-- Error State (Hands-On 9 selectCoursesError) -->
  <div *ngIf="error$ | async as error" class="empty-state">
    <div class="empty-icon">⚠️</div>
    <h3>Failed to Load Catalogue</h3>
    <p>{{ error }}</p>
  </div>

  <!-- Main Grid when Loaded -->
  <div *ngIf="!(loading$ | async) && !(error$ | async)">
    <!-- Resolve filtered courses list using async pipe (Hands-On 9 Step 96) -->
    <div *ngIf="filteredCourses$ | async as coursesList">
      <div *ngIf="coursesList.length > 0; else noCourses" class="courses-grid">
        <app-course-card
          *ngFor="let c of coursesList; let i = index; trackBy: trackByCourseId"
          appHighlight="#f5f3ff"
          [course]="c"
          (enrollRequested)="onEnroll($event)"
          (click)="goToDetails(c.id)">
        </app-course-card>
      </div>
    </div>
  </div>

  <!-- Fallback Template for Empty Courses -->
  <ng-template #noCourses>
    <div class="empty-state">
      <div class="empty-icon">📭</div>
      <h3>No courses found</h3>
      <p>Try searching for a different term or view the whole catalog.</p>
    </div>
  </ng-template>

  <!-- Selected Course Banner -->
  <div *ngIf="selectedCourseId && !(loading$ | async)" class="selected-banner">
    <div class="banner-content">
      <span class="banner-icon">ℹ️</span>
      <p>Selected course ID: <strong class="badge-id">{{ selectedCourseId }}</strong></p>
    </div>
  </div>
</div>
